name: Keepalive
on:
  schedule:
    - cron: '0 0 1 * *'  # 1st of each month
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Keep repository active
        run: |
          set -e
          mkdir -p .github
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/keepalive.timestamp

          if git diff --quiet -- .github/keepalive.timestamp; then
            echo "No keepalive changes detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive.timestamp
          git commit -m "chore(ci): monthly keepalive"
          git push
